name: Build VideoFilter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build BaseClasses
      shell: cmd
      run: |
        cd baseclasses
        msbuild baseclasses.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
        copy x64\Release\strmbase.lib strmbase.lib

    - name: Configure CMake
      run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build Filter
      run: cmake --build build --config Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VideoFilter
        path: build/Release/VideoFilter.ax
